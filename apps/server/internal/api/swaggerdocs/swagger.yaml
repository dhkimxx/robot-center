      tags:
      - Robot API
  /api/v1/robot/sfu/ws:
    get:
      description: Robot publisher가 mission room에 WebRTC signaling용 WebSocket으로 접속합니다.
      parameters:
      - description: 접속할 missionCode room
        in: query
        name: room
        required: true
        type: string
      responses:
        "101":
          description: Switching Protocols
          schema:
            type: string
      security:
      - RobotBearerAuth: []
      summary: Robot SFU WebSocket 연결
      tags:
      - Robot API
  /api/v1/system/object-storage/clear:
    post:
      consumes:
      - application/json
      description: 확인 문자열을 받은 뒤 테스트용 object storage 데이터를 정리합니다. production 환경에서는 실행되지
        않습니다.
      parameters:
      - description: Object Storage 초기화 요청
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ClearObjectStorageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ClearObjectStorageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
        "403":
          description: Forbidden
