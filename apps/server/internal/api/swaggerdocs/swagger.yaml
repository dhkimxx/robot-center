            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      summary: Object Storage 초기화
      tags:
      - 시스템 API
  /api/v1/system/sensors/clear:
    post:
      consumes:
