      - description: Sensor 데이터 초기화 요청
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ClearSensorDataRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ClearSensorDataResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
