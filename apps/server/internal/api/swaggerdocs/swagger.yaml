  robot-center_apps_server_internal_api_dto.UpdateRobotRequest:
    properties:
      displayName:
        type: string
      modelName:
        type: string
    type: object
  robot-center_apps_server_internal_domain.RobotConnectionState:
    enum:
    - fault
    - offline
    - online
    type: string
    x-enum-varnames:
    - RobotConnectionStateFault
    - RobotConnectionStateOffline
    - RobotConnectionStateOnline
  robot-center_apps_server_internal_domain.RobotDeviceState:
    enum:
    - fault
    - offline
    - online
    type: string
    x-enum-varnames:
    - RobotDeviceStateFault
    - RobotDeviceStateOffline
    - RobotDeviceStateOnline
  robot-center_apps_server_internal_service.ObjectStorageClearResult:
    properties:
      bucket:
        type: string
      deletedBytes:
        type: integer
      deletedObjectCount:
        type: integer
      recordingChunksReset:
