      lastMessageAt:
        type: string
      messageCount:
        type: integer
      openedAt:
        type: string
      state:
        type: string
    type: object
  robot-center_apps_server_internal_sfu.ObservedPublisherSummary:
    properties:
      dataChannelCount:
        type: integer
      dataChannelStates:
        items:
          $ref: '#/definitions/robot-center_apps_server_internal_sfu.ObservedDataChannelSummary'
        type: array
      dataChannels:
        items:
          type: string
        type: array
      firstTrackAt:
        type: string
      iceState:
        type: string
      joinedAt:
        type: string
      lastDataAt:
        type: string
      lastTrackAt:
        type: string
      publisherPeerId:
        type: string
      robotCode:
        type: string
      state:
        type: string
      subscriberCount:
        type: integer
      trackCount:
        type: integer
      tracks:
        items:
          type: string
        type: array
      updatedAt:
        type: string
    type: object
  robot-center_apps_server_internal_sfu.PeerSummary:
    properties:
      joinedAt:
        type: string
      peerId:
        type: string
      robotCode:
        type: string
      role:
        type: string
      selectedRobotCode:
        type: string
    type: object
  robot-center_apps_server_internal_sfu.RoomSummary:
    properties:
      mediaMode:
        type: string
      operatorCount:
        type: integer
      peers:
        items:
          $ref: '#/definitions/robot-center_apps_server_internal_sfu.PeerSummary'
        type: array
      publishedTracks:
        items:
          type: string
        type: array
      publishers:
        items:
          $ref: '#/definitions/robot-center_apps_server_internal_sfu.ObservedPublisherSummary'
        type: array
      recorderCount:
        type: integer
      robotCount:
        type: integer
      roomId:
        type: string
