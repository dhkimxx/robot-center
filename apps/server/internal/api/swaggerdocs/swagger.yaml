      tags:
      - Recorder API
  /api/v1/recorder/finalization-jobs/claim:
    post:
      consumes:
      - application/json
      description: recorder-worker가 처리할 finalization job을 claim합니다.
      parameters:
      - description: finalization job claim 요청
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/robot-center_apps_server_internal_api_dto.RecorderFinalizationClaimRequest'
