info:
  contact: {}
  description: Robot Center 관제 서버 API입니다. Robot, Operator, Recorder, System 역할별 API를
    제공합니다.
  title: Robot Center 관제 API
  version: "0.1"
paths:
  /api/v1/operator/missions:
    get:
      description: 관제 서버에 등록된 임무 목록을 반환합니다.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.MissionsResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      summary: 임무 목록 조회
      tags:
      - Operator API
    post:
      consumes:
      - application/json
      description: 로봇을 배정한 임무를 생성합니다.
      parameters:
      - description: 임무 생성 요청
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/robot-center_apps_server_internal_api_dto.CreateMissionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.MissionEnvelopeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      summary: 임무 생성
      tags:
      - Operator API
  /api/v1/operator/missions/{missionCode}/end:
    post:
      description: active 상태 임무를 ended 상태로 전환하고 SFU room을 닫습니다.
      parameters:
      - description: 임무 코드
        in: path
        name: missionCode
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.MissionEnvelopeResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      summary: 임무 종료
      tags:
      - Operator API
  /api/v1/operator/missions/{missionCode}/events:
    get:
      description: operator가 mission 기준 이벤트 로그를 조회합니다. 기본 조회는 Live 이벤트 피드용이며 detection.object는
        제외합니다. detection overlay 로그는 eventType 또는 includeDetections=true로 명시 조회합니다.
      parameters:
      - description: 임무 코드
        in: path
        name: missionCode
        required: true
        type: string
      - description: 로봇 코드
        in: query
        name: robotCode
        type: string
      - description: '이벤트 타입. 예: mission.event, detection.object'
        in: query
        name: eventType
        type: string
      - description: '이벤트 카테고리. 예: mission, detection, alarm, system'
        in: query
        name: eventCategory
        type: string
      - description: '미디어 track ID. 예: track.video_1'
        in: query
        name: trackId
        type: string
      - description: 기본 이벤트 피드에 detection.object 포함 여부
        in: query
        name: includeDetections
        type: boolean
      - description: 조회 개수 제한. 기본 100, 최대 500
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.OperatorMissionEventsResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      summary: 임무 이벤트 조회
      tags:
      - Operator API
  /api/v1/operator/missions/{missionCode}/live-status:
    get:
      description: 임무에 배정된 로봇의 연결, 스트림, 녹화 상태를 반환합니다.
      parameters:
      - description: 임무 코드
        in: path
        name: missionCode
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.MissionLiveStatusResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      summary: 임무 live status 조회
      tags:
      - Operator API
  /api/v1/operator/missions/{missionCode}/recordings/chunks:
    get:
      description: 관제 UI 리플레이 화면이 특정 임무의 녹화 chunk를 최신순으로 페이지 조회합니다. robotCode를 지정하면
        해당 로봇의 chunk만 반환합니다.
      parameters:
      - description: 조회할 임무 코드
        in: path
        name: missionCode
        required: true
        type: string
      - description: 조회할 로봇 코드
        in: query
        name: robotCode
        type: string
      - description: 페이지 크기. 기본 100, 최대 200
        in: query
        name: limit
        type: integer
      - description: 조회 시작 위치. 기본 0
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.OperatorMissionRecordingChunksResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      summary: 임무 녹화 chunk 페이지 조회
      tags:
      - Operator API
  /api/v1/operator/missions/{missionCode}/recordings/summary:
    get:
      description: 관제 UI 리플레이 화면이 특정 임무의 로봇별 녹화 청크 수와 파일 저장 상태를 요약 조회합니다.
      parameters:
      - description: 조회할 임무 코드
        in: path
        name: missionCode
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.OperatorMissionRecordingSummaryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      summary: 임무 녹화 요약 조회
      tags:
      - Operator API
  /api/v1/operator/missions/{missionCode}/start:
    post:
      description: ready 상태 임무를 active 상태로 전환합니다.
      parameters:
      - description: 임무 코드
        in: path
        name: missionCode
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.MissionEnvelopeResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      summary: 임무 시작
      tags:
      - Operator API
  /api/v1/operator/recordings:
    get:
      description: 관제 UI가 조회하는 recording chunk와 파일 상태 목록을 최신순으로 최대 300개 반환합니다. missionCode를
        지정하면 해당 임무 안에서 최신 300개를 반환합니다.
      parameters:
      - description: 조회할 임무 코드
        in: query
        name: missionCode
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.OperatorRecordingsResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      summary: 녹화 chunk 조회
      tags:
      - Operator API
  /api/v1/operator/robots:
    get:
      description: 관제 서버에 등록된 로봇 목록을 반환합니다.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.RobotsResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      summary: 로봇 목록 조회
      tags:
      - Operator API
    post:
      consumes:
      - application/json
      description: 관제 서버에 로봇을 등록하고 로봇 런타임 접속 정보를 함께 반환합니다.
      parameters:
      - description: 로봇 생성 요청
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/robot-center_apps_server_internal_api_dto.CreateRobotRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.CreateRobotResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      summary: 로봇 생성
      tags:
      - Operator API
  /api/v1/operator/robots/{robotCode}:
    delete:
      description: 로봇을 active 목록에서 제외합니다.
      parameters:
      - description: 로봇 코드
        in: path
        name: robotCode
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.RobotEnvelopeResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      summary: 로봇 보관 처리
      tags:
      - Operator API
    patch:
      consumes:
      - application/json
      description: 로봇 표시 이름과 모델명을 수정합니다.
      parameters:
      - description: 로봇 코드
        in: path
        name: robotCode
        required: true
        type: string
      - description: 로봇 수정 요청
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/robot-center_apps_server_internal_api_dto.UpdateRobotRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.RobotEnvelopeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      summary: 로봇 수정
      tags:
      - Operator API
  /api/v1/operator/robots/{robotCode}/connection-info:
    get:
      description: 로봇 런타임 접속에 필요한 serverUrl, robotCode, robotToken을 조회합니다.
      parameters:
      - description: 로봇 코드
        in: path
        name: robotCode
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.RobotConnectionInfoEnvelopeResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      summary: 로봇 연결 정보 조회
      tags:
      - Operator API
  /api/v1/operator/robots/{robotCode}/connection-token:
    post:
      description: 로봇 API용 robotToken을 재발급합니다.
      parameters:
      - description: 로봇 코드
        in: path
        name: robotCode
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.RobotConnectionInfoEnvelopeResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      summary: 로봇 token 재발급
      tags:
      - Operator API
  /api/v1/operator/rtc-config:
    get:
      description: 관제 UI operator peer가 사용할 signaling URL과 ICE 서버 설정을 반환합니다.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.RTCConfigResponse'
      summary: 관제 WebRTC 설정 조회
      tags:
      - Operator API
  /api/v1/operator/sensor-descriptors:
    get:
      description: missionId, robotCode 조건으로 센서 descriptor 목록을 조회합니다.
      parameters:
      - description: mission ID 또는 missionCode
        in: query
        name: missionId
        type: string
      - description: 로봇 코드
        in: query
        name: robotCode
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.SensorDescriptorsResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      summary: 센서 descriptor 조회
      tags:
      - Operator API
  /api/v1/operator/sensor-latest:
    get:
      description: missionId, robotCode 조건으로 센서별 최신 sample을 조회합니다.
      parameters:
      - description: mission ID 또는 missionCode
        in: query
        name: missionId
        type: string
      - description: 로봇 코드
        in: query
        name: robotCode
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.SensorLatestListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      summary: 센서 latest 조회
      tags:
      - Operator API
  /api/v1/operator/sensor-samples:
    get:
      description: missionId, robotCode, sensorId 조건과 limit으로 센서 sample 목록을 조회합니다.
      parameters:
      - description: mission ID 또는 missionCode
        in: query
        name: missionId
        type: string
      - description: 로봇 코드
        in: query
        name: robotCode
        type: string
      - description: 센서 ID
        in: query
        name: sensorId
        type: string
      - description: 조회 개수 제한
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.SensorSamplesResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      summary: 센서 sample 조회
      tags:
      - Operator API
  /api/v1/operator/sfu/ws:
    get:
      description: 관제 UI operator peer가 mission room에 WebRTC signaling용 WebSocket으로
        접속합니다.
      parameters:
      - description: 접속할 missionCode room
        in: query
        name: room
        required: true
        type: string
      responses:
        "101":
          description: Switching Protocols
          schema:
            type: string
      summary: Operator SFU WebSocket 연결
      tags:
      - Operator API
  /api/v1/recorder/chunks/{chunkID}/files/{fileType}/uploaded:
    post:
      consumes:
      - application/json
      description: recorder-worker가 chunk의 개별 파일 업로드 완료를 보고합니다.
      parameters:
      - description: recording chunk ID
        in: path
        name: chunkID
        required: true
        type: string
      - description: 업로드된 파일 타입
        in: path
        name: fileType
        required: true
        type: string
      - description: 업로드 메타데이터
        in: body
        name: request
        schema:
          $ref: '#/definitions/robot-center_apps_server_internal_api_dto.RecorderUploadRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.RecorderRecordingChunkEnvelopeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      summary: 녹화 파일 업로드 완료
      tags:
      - Recorder API
  /api/v1/recorder/chunks/{chunkID}/uploaded:
    post:
      consumes:
      - application/json
      description: recorder-worker가 chunk manifest 업로드 완료를 보고합니다.
      parameters:
      - description: recording chunk ID
        in: path
        name: chunkID
        required: true
        type: string
      - description: 업로드 메타데이터
        in: body
        name: request
        schema:
          $ref: '#/definitions/robot-center_apps_server_internal_api_dto.RecorderUploadRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.RecorderRecordingChunkEnvelopeResponse'
        "400":
          description: Bad Request
          schema:
