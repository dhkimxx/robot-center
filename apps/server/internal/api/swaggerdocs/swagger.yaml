        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      security:
      - RobotBearerAuth: []
      summary: Robot heartbeat 반영
      tags:
      - Robot API
  /api/v1/robot/mission:
    get:
      description: Robot token으로 인증된 로봇의 현재 active mission과 SFU 연결 정보를 반환합니다.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.RobotMissionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      security:
      - RobotBearerAuth: []
