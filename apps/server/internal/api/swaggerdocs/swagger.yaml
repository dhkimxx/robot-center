            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.OKResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      summary: 녹화 finalization job 완료
      tags:
      - Recorder API
  /api/v1/recorder/finalization-jobs/{jobID}/failed:
    post:
      consumes:
      - application/json
      description: recorder-worker가 finalization job 실패를 보고합니다.
      parameters:
      - description: finalization job ID
        in: path
        name: jobID
        required: true
        type: string
      - description: finalization job 상태 요청
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/robot-center_apps_server_internal_api_dto.RecorderFinalizationStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.OKResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/robot-center_apps_server_internal_api_dto.ErrorResponse'
      summary: 녹화 finalization job 실패
      tags:
      - Recorder API
  /api/v1/recorder/finalization-jobs/{jobID}/partial:
    post:
      consumes:
      - application/json
      description: recorder-worker가 finalization job 부분 완료를 보고합니다.
